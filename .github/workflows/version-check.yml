name: Version Staleness Check

on:
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      stale_only:
        description: 'Report stale apps only'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: read
  issues: write

jobs:
  check-versions:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run version check
        id: check
        shell: pwsh
        run: |
          $results = pwsh -File tools/check-versions.ps1 -OutputFormat json | ConvertFrom-Json
          $stale = $results | Where-Object { $_.Status -eq 'stale' }

          # Write summary to step output
          "stale_count=$($stale.Count)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "total_count=$($results.Count)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

          if ($stale.Count -gt 0) {
            # Build issue body
            $body = @"
          ## 📦 Weekly Version Staleness Report

          The following app docs appear to be out of date based on their latest winget version.

          | App | Doc Version | Latest (winget) | File |
          |-----|-------------|-----------------|------|
          "@
            foreach ($app in $stale) {
              $body += "`n| $($app.App) | $($app.DocVer) | $($app.Latest) | ``windows/$($app.File)`` |"
            }
            $body += @"

          ---

          **How to update:**
          1. Install the latest version of the app in a test VM
          2. Check registry with `regedit` or `reg query` for any new/changed keys
          3. Update the version number and any changed keys in the relevant \`.md\` file
          4. Run \`pwsh -File tools/validate-docs.ps1\` to verify
          5. Submit a PR with your changes

          *Generated by the [Version Staleness Check](${{ github.server_url }}/${{ github.repository }}/actions/workflows/version-check.yml) workflow.*
          "@

            # Write body to file to avoid shell escaping issues
            $body | Out-File -FilePath stale-report.md -Encoding utf8
            "has_stale=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "has_stale=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Close previous staleness issues
        if: steps.check.outputs.has_stale == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'stale-docs,automated'
            });
            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
            }

      - name: Open staleness issue
        if: steps.check.outputs.has_stale == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('stale-report.md', 'utf8');
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📦 Stale docs detected — ${date} (${{ steps.check.outputs.stale_count }} apps)`,
              body: body,
              labels: ['stale-docs', 'automated', 'documentation']
            });

      - name: Print summary
        shell: pwsh
        run: |
          $stale = '${{ steps.check.outputs.stale_count }}'
          $total = '${{ steps.check.outputs.total_count }}'
          if ($stale -eq '0') {
            Write-Host "✅ All $total app docs are current — no stale docs found." -ForegroundColor Green
          } else {
            Write-Host "⚠️  $stale of $total app docs are potentially stale." -ForegroundColor Yellow
            Write-Host "A GitHub issue has been opened with details." -ForegroundColor Yellow
          }
