# App Documentation Backlog
#
# This file is the queue for new app documentation stubs.
# The weekly add-apps.yml workflow reads this file, picks the first N apps
# with status: queued, generates stub docs, and opens a draft PR.
#
# Status values:
#   queued  - not yet generated; will be picked up by the workflow
#   stub    - stub doc exists in windows/; awaiting human verification
#   done    - fully verified and merged into main
#
# Fields:
#   name           Display name (matches the H1 heading in the doc)
#   slug           Filename without .md (lowercase, hyphens)
#   winget_id      Winget package identifier (used for version checks)
#   installer_type exe | msi | winget | portable | msix
#   tags           YAML list of frontmatter tags
#   hives          Registry hives expected: HKCU, HKLM, HKCR
#   status         queued | stub | done

