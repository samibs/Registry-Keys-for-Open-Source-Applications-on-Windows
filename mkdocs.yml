site_name: Registry Keys for Open-Source Windows Apps
site_description: >-
  Community reference of Windows registry keys for 100+ open-source applications.
  Covers HKCU, HKLM, HKCR paths for sysadmins, automation developers, and power users.
site_url: https://samibs.github.io/Registry-Keys-for-Open-Source-Applications-on-Windows/
site_author: Sami BS and contributors
repo_url: https://github.com/samibs/Registry-Keys-for-Open-Source-Applications-on-Windows
repo_name: samibs/registry-keys-oss-windows
edit_uri: edit/main/windows/
copyright: >-
  &copy; 2024–2026 Sami BS and contributors &mdash;
  <a href="https://github.com/samibs/Registry-Keys-for-Open-Source-Applications-on-Windows/blob/main/LICENSE">MIT License</a>

docs_dir: windows

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.top
    - search.highlight
    - search.suggest
    - content.action.edit
  language: en

plugins:
  - search:
      lang: en
  - tags

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/samibs/Registry-Keys-for-Open-Source-Applications-on-Windows
      name: View on GitHub
  generator: false

extra_css:
  - assets/extra.css

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences

